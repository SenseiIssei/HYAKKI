<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380" role="img" aria-label="HYAKKI — a hundred demons">
  <defs>
    <radialGradient id="vig" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#140f0c"/>
      <stop offset="60%" stop-color="#0a0908"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efe7d3"/>
      <stop offset="100%" stop-color="#cdc3aa"/>
    </linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="9"/></filter>
  </defs>

  <rect width="1200" height="380" fill="url(#vig)"/>

  <!-- the Parade: faint marks drifting downward, always slightly too slow -->
  <g fill="#46707a" opacity="0.16">
    <g>
      <rect x="120" y="-40" width="2" height="26"/><rect x="360" y="-90" width="2" height="26"/>
      <rect x="820" y="-20" width="2" height="26"/><rect x="1040" y="-120" width="2" height="26"/>
      <rect x="600" y="-160" width="2" height="26"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 520" dur="14s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- vermilion under-glow, breathing -->
  <ellipse cx="600" cy="176" rx="260" ry="120" fill="#c1372b" filter="url(#soft)">
    <animate attributeName="opacity" values="0.22;0.40;0.20;0.34;0.22" dur="5.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- the mark -->
  <text x="600" y="228" text-anchor="middle" font-family="'Yu Mincho','Hiragino Mincho ProN','Noto Serif JP',serif" font-size="188" fill="url(#paper)" letter-spacing="10">百鬼</text>

  <!-- a vermilion boundary stroke that flickers like a warded seal -->
  <text x="600" y="228" text-anchor="middle" font-family="'Yu Mincho','Hiragino Mincho ProN','Noto Serif JP',serif" font-size="188" fill="none" stroke="#cf4436" stroke-width="1.2" letter-spacing="10" opacity="0.5">
    百鬼
    <animate attributeName="opacity" values="0;0.7;0.1;0.6;0" dur="4s" repeatCount="indefinite"/>
  </text>

  <text x="600" y="288" text-anchor="middle" font-family="ui-monospace,'Cascadia Mono',Consolas,monospace" font-size="30" fill="#e4dccb" letter-spacing="26">H Y A K K I</text>
  <text x="600" y="326" text-anchor="middle" font-family="'Iowan Old Style',Palatino,Georgia,serif" font-size="19" fill="#9a9081" font-style="italic">A hundred demons. Which is to say: too many to count.</text>

  <!-- hairline rules -->
  <line x1="360" y1="304" x2="470" y2="304" stroke="#251e19" stroke-width="1"/>
  <line x1="730" y1="304" x2="840" y2="304" stroke="#251e19" stroke-width="1"/>
</svg>
